version: "3.9"

services:
  medharmony-agent:
    build: .
    container_name: medharmony-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - A2A_HOST=0.0.0.0
      - A2A_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
